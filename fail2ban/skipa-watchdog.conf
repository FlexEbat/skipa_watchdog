# Пример fail2ban-фильтра для интеграции с skipa-watchdog.
#
# Это АЛЬТЕРНАТИВНЫЙ способ бана: вместо того, чтобы бот banning.py сам
# управлял ipset, можно поручить реальную блокировку fail2ban'у, а бот будет
# только писать в отдельный лог факты обнаружения. Тогда все баны (от разных
# джейлов + skipa-watchdog) видны в одном месте: `fail2ban-client status`.
#
# Установка:
#   sudo cp skipa-watchdog.conf /etc/fail2ban/filter.d/
#   sudo cp ../fail2ban/jail-skipa-watchdog.local /etc/fail2ban/jail.d/
#   sudo systemctl restart fail2ban
#   sudo fail2ban-client status skipa-watchdog
#
# ВАЖНО: этот способ - альтернатива, а не дополнение к встроенному
# banning.py/ipset. Если пользуетесь этим способом, отключите
# banning.auto_ban_new_hits в config.yaml, чтобы не банить дважды.

[Definition]
# Матчит строки из data/alerts.log вида:
# ===== 2026-07-23 10:00:00 | IP=203.0.113.42 | match=203.0.113.0/24 =====
failregex = ^===== .* \| IP=<HOST> \| match=.* =====$
ignoreregex =
