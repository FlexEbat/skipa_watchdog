# Скопируйте этот файл в config.yaml и заполните своими значениями.

telegram:
  # Токен бота, полученный у @BotFather
  bot_token: "123456789:AAAA-your-bot-token-here"
  # ID чата/канала, куда слать уведомления (можно узнать через @userinfobot
  # или @getmyid_bot; для канала — это отрицательное число вида -100XXXXXXXXXX)
  chat_id: -1001234567890
  # ID пользователей, которым разрешено дергать команды бота (/status, /update, ...)
  # Если список пуст — команды разрешены всем, кто пишет боту в личку.
  admin_ids: []

sources:
  # Откуда брать списки IP (raw-ссылки на репозиторий tread-lightly/CyberOK_Skipa_ips)
  cidr_list_url: "https://raw.githubusercontent.com/tread-lightly/CyberOK_Skipa_ips/main/lists/skipa_cidr.txt"
  range_list_url: "https://raw.githubusercontent.com/tread-lightly/CyberOK_Skipa_ips/main/lists/skipa_range.txt"
  # Как часто обновлять базу IP (в днях). По заданию — раз в неделю.
  update_interval_days: 7

monitoring:
  # Как обнаруживать подключения известных сканеров:
  # "psutil"     - опрос активных сокетов через psutil (просто, но может пропускать
  #                очень короткие TCP-сессии вроде одиночного SYN от zmap/zgrab)
  # "kernel_log" - хвостование journalctl -k -f по логам nftables/iptables,
  #                ловит любой входящий SYN (нужно один раз настроить nftables,
  #                см. README.md -> "Расширенный мониторинг через nftables")
  # "both"       - оба метода сразу, дедупликация алертов общая
  method: "psutil"
  # Префикс, который вы указали в правиле `log prefix "..."` (для method: kernel_log/both)
  kernel_log_prefix: "CONN: "
  # Необязательно: своя команда для чтения kernel-лога вместо journalctl -k -f,
  # например ["tail", "-F", "/var/log/kern.log"] на системах с rsyslog вместо journald
  kernel_log_command: []
  # Как часто (в секундах) опрашивать активные сетевые соединения сервера (для method: psutil)
  poll_interval_seconds: 5
  # Через сколько минут можно снова слать алерт по тому же IP (антиспам)
  alert_cooldown_minutes: 60
  # Свои IP/подсети, которые никогда не должны триггерить алерт (например, ваш VPN/офис)
  ignore_ips: []

enrichment:
  # Токен ipinfo.io (необязателен, без него тоже работает, но с меньшим лимитом запросов)
  # Получить бесплатно: https://ipinfo.io/signup
  ipinfo_token: ""
  # Ключ ipregistry.co для блока "Privacy info" (Proxy/Abuser/Server)
  # Бесплатный тариф: https://ipregistry.co
  ipregistry_key: ""

alerting:
  # Если отправка в Telegram не удалась (нет сети, Telegram недоступен и т.п.),
  # алерт не теряется: он складывается в data/pending_telegram.jsonl и бот
  # пытается доотправить его каждые retry_interval_seconds секунд, пока не
  # получится. Проверить очередь можно командой /pending или /status.
  # Кроме того, КАЖДЫЙ обнаруженный скан всегда пишется в data/alerts.log
  # (человекочитаемый журнал), независимо от результата отправки в Telegram.
  retry_interval_seconds: 300

logging:
  level: "INFO"
